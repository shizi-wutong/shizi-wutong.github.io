<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 · 柿子梧桐</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter','Microsoft YaHei',sans-serif;
    background:#0a0a12; color:#e0d8f0;
    min-height:100vh; display:flex;
  }
  .sidebar {
    width:220px; background:#12121e;
    padding:24px; border-right:1px solid rgba(255,255,255,0.03);
    display:flex; flex-direction:column;
  }
  .sidebar h2 { font-size:16px; margin-bottom:24px; color:#ffd700; }
  .sidebar a {
    color:#8a8aaa; text-decoration:none; padding:10px 0;
    font-size:14px; transition:color 0.3s; cursor:pointer;
  }
  .sidebar a:hover, .sidebar a.active { color:#ffd700; }
  .main { flex:1; padding:32px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; }
  .header h1 { font-size:24px; }
  .header .site-link { color:#8a8aaa; font-size:13px; text-decoration:none; }
  .header .site-link:hover { color:#ffd700; }
  .btn {
    padding:10px 24px; border-radius:8px; font-size:13px; font-weight:600;
    border:none; cursor:pointer; transition:all 0.3s;
    font-family:'Inter',sans-serif;
  }
  .btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; }
  .btn-primary:hover { transform:translateY(-2px); }
  .btn-danger { background:#cc4444; color:#fff; }
  .btn-danger:hover { transform:translateY(-2px); }
  .btn-outline { background:transparent; border:1px solid rgba(255,215,0,0.2); color:#ffd700; }
  .btn-outline:hover { background:rgba(255,215,0,0.1); }

  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.03); font-size:14px; }
  th { color:#8a8aaa; font-weight:400; font-size:12px; letter-spacing:1px; text-transform:uppercase; }
  td { color:#e0d8f0; }
  td .actions { display:flex; gap:8px; }
  td .actions button { padding:4px 12px; font-size:12px; border-radius:4px; }

  .modal {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
    align-items:center; justify-content:center; padding:20px;
  }
  .modal.show { display:flex; }
  .modal-content {
    background:#12121e; border-radius:16px;
    max-width:700px; width:100%; max-height:85vh; overflow-y:auto;
    padding:32px; border:1px solid rgba(255,215,0,0.1);
  }
  .modal-content h2 { margin-bottom:24px; }
  .modal .close { float:right; font-size:24px; cursor:pointer; color:#8a8aaa; }
  .modal .close:hover { color:#ffd700; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; color:#8a8aaa; margin-bottom:6px; }
  .form-group input, .form-group textarea {
    width:100%; padding:10px 14px;
    background:#1a1a2e; border:1px solid rgba(255,255,255,0.06);
    border-radius:6px; color:#e0d8f0; font-size:14px;
    font-family:'Inter',sans-serif; outline:none;
  }
  .form-group input:focus, .form-group textarea:focus { border-color:#ffd700; }
  .form-group textarea { min-height:300px; font-family:monospace; font-size:13px; line-height:1.6; resize:vertical; }
  .form-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .form-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }

  .empty-state { text-align:center; padding:80px 20px; color:#8a8aaa; }
  .empty-state .icon { font-size:48px; margin-bottom:16px; }
  .login-screen {
    display:flex; align-items:center; justify-content:center;
    width:100%; min-height:100vh;
  }
  .login-box {
    background:#12121e; padding:40px; border-radius:16px;
    border:1px solid rgba(255,215,0,0.1); text-align:center;
    max-width:360px; width:100%;
  }
  .login-box h2 { margin-bottom:8px; }
  .login-box p { color:#8a8aaa; font-size:14px; margin-bottom:24px; }
  .login-box input { width:100%; padding:12px; margin-bottom:12px; background:#1a1a2e; border:1px solid rgba(255,255,255,0.06); border-radius:6px; color:#e0d8f0; font-size:14px; text-align:center; outline:none; }
  .login-box input:focus { border-color:#ffd700; }
  .login-box .error { color:#cc4444; font-size:13px; margin-top:8px; display:none; }
  .tag-input { display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:#1a1a2e; border:1px solid rgba(255,255,255,0.06); border-radius:6px; min-height:42px; }
  .tag-input .tag { background:rgba(255,215,0,0.1); color:#ffd700; padding:2px 10px; border-radius:12px; font-size:12px; display:flex; align-items:center; gap:4px; }
  .tag-input .tag .del { cursor:pointer; opacity:0.6; }
  .tag-input .tag .del:hover { opacity:1; }
  .tag-input input { border:none; background:transparent; flex:1; min-width:60px; padding:4px; outline:none; color:#e0d8f0; }
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <h2>🍅 管理后台</h2>
    <a class="active" onclick="showView('posts')">📝 文章管理</a>
    <a onclick="showView('settings')">⚙ 网站设置</a>
    <a onclick="preview()">👁 预览网站</a>
    <a href="../index.html" style="margin-top:auto;color:#555;">← 返回首页</a>
  </div>
  <div class="main">
    <div class="header">
      <h1 id="pageTitle">📝 文章管理</h1>
      <div>
        <button class="btn btn-primary" onclick="openEditor()">+ 写新文章</button>
      </div>
    </div>

    <div id="postsView">
      <table id="postsTable">
        <thead><tr><th>标题</th><th>日期</th><th>标签</th><th>操作</th></tr></thead>
        <tbody id="postsBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">
        <div class="icon">📝</div>
        <h3>还没有文章</h3>
        <p style="color:#8a8aaa;margin-top:8px;">点击右上角「写新文章」开始创作</p>
      </div>
    </div>

    <div id="settingsView" style="display:none;">
      <div class="form-group">
        <label>站点密码（用于登录后台）</label>
        <input type="text" id="adminPassword" value="shizi2026" style="max-width:300px;">
        <p style="color:#8a8aaa;font-size:12px;margin-top:4px;">默认为 shizi2026，建议修改</p>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- ===== 编辑器弹窗 ===== -->
<div class="modal" id="editorModal">
  <div class="modal-content">
    <span class="close" onclick="closeEditor()">✕</span>
    <h2 id="editorTitle">写新文章</h2>
    <div class="form-group">
      <label>文章标题</label>
      <input type="text" id="editTitle" placeholder="输入标题...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="editDate">
      </div>
      <div class="form-group" style="grid-column:span 2;">
        <label>标签（按回车添加）</label>
        <div class="tag-input" id="tagContainer">
          <input type="text" id="tagInput" placeholder="输入标签后按回车" onkeydown="if(event.key==='Enter'){addTag();event.preventDefault();}">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>摘要</label>
      <input type="text" id="editSummary" placeholder="一句话概括文章内容...">
    </div>
    <div class="form-group">
      <label>正文（支持 HTML）</label>
      <textarea id="editContent" placeholder="在这里写文章内容...&#10;&#10;支持 HTML 标签：&lt;h3&gt;标题&lt;/h3&gt; &lt;p&gt;段落&lt;/p&gt; &lt;strong&gt;加粗&lt;/strong&gt;"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeEditor()">取消</button>
      <button class="btn btn-primary" onclick="savePost()">💾 保存文章</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'shizi_posts';
const SETTINGS_KEY = 'shizi_settings';
let editingId = null;
let tags = [];

function loadPosts() {
  const data = localStorage.getItem(STORAGE_KEY);
  return data ? JSON.parse(data) : [
    { id:1, title:'🎬 《光之勇者》制作记', date:'2026-06-26', tags:['动画','RPG'], summary:'从像素风到高级CG，再到RPG Maker风格——记录一部动画的三种姿态。', content:'<p>用 Canvas 逐像素绘制角色，从勇者的铠甲到魔王的角...</p>' },
    { id:2, title:'🧩 我的第一个 RMMZ 插件', date:'2026-06-25', tags:['RMMZ','JavaScript'], summary:'从零开始写 RPG Maker MZ 插件踩过的坑。', content:'<p>MZ 的插件本质上是 JavaScript...</p>' },
    { id:3, title:'🤖 手撸一个 AI 编程智能体', date:'2026-06-24', tags:['AI','Python'], summary:'从零搭建 AI Agent 的完整记录。', content:'<p>核心就三个字：循环、工具、调用。</p>' },
  ];
}

function savePosts(posts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
  // 同步到首页（同域下）
  renderTable();
}

function renderTable() {
  const posts = loadPosts();
  const tbody = document.getElementById('postsBody');
  const empty = document.getElementById('emptyState');
  if (posts.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('postsTable').style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  document.getElementById('postsTable').style.display = '';
  tbody.innerHTML = posts.map(p => `
    <tr>
      <td style="font-weight:600;">${p.title}</td>
      <td style="color:#8a8aaa;">${p.date}</td>
      <td>${p.tags.map(t=>`<span style="color:#ffd700;font-size:12px;margin-right:4px;">#${t}</span>`).join('')}</td>
      <td>
        <div class="actions">
          <button class="btn btn-outline" style="padding:4px 12px;font-size:12px;" onclick="openEditor(${p.id})">编辑</button>
          <button class="btn btn-danger" style="padding:4px 12px;font-size:12px;" onclick="deletePost(${p.id})">删除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openEditor(id) {
  editingId = id || null;
  tags = [];
  if (id) {
    const post = loadPosts().find(p => p.id === id);
    document.getElementById('editorTitle').textContent = '✏️ 编辑文章';
    document.getElementById('editTitle').value = post.title;
    document.getElementById('editDate').value = post.date;
    document.getElementById('editSummary').value = post.summary;
    document.getElementById('editContent').value = post.content;
    tags = [...post.tags];
  } else {
    document.getElementById('editorTitle').textContent = '📝 写新文章';
    document.getElementById('editTitle').value = '';
    document.getElementById('editDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('editSummary').value = '';
    document.getElementById('editContent').value = '';
  }
  renderTags();
  document.getElementById('editorModal').classList.add('show');
}

function closeEditor() {
  document.getElementById('editorModal').classList.remove('show');
  editingId = null;
}

function addTag() {
  const input = document.getElementById('tagInput');
  const tag = input.value.trim();
  if (tag && !tags.includes(tag)) { tags.push(tag); renderTags(); }
  input.value = '';
}

function renderTags() {
  const container = document.getElementById('tagContainer');
  const input = document.getElementById('tagInput');
  container.innerHTML = tags.map(t => `<span class="tag">${t}<span class="del" onclick="removeTag('${t}')">✕</span></span>`).join('');
  container.appendChild(input);
  input.focus();
}

function removeTag(tag) {
  tags = tags.filter(t => t !== tag);
  renderTags();
}

function savePost() {
  const title = document.getElementById('editTitle').value.trim();
  const date = document.getElementById('editDate').value;
  const summary = document.getElementById('editSummary').value.trim();
  const content = document.getElementById('editContent').value.trim();
  if (!title || !content) { alert('标题和正文不能为空'); return; }

  let posts = loadPosts();
  if (editingId) {
    const idx = posts.findIndex(p => p.id === editingId);
    posts[idx] = { ...posts[idx], title, date, tags: [...tags], summary, content };
  } else {
    const newId = Math.max(...posts.map(p=>p.id), 0) + 1;
    posts.push({ id:newId, title, date, tags:[...tags], summary, content });
  }
  savePosts(posts);
  closeEditor();
  renderTable();
}

function deletePost(id) {
  if (!confirm('确定删除这篇文​​章？')) return;
  let posts = loadPosts().filter(p => p.id !== id);
  savePosts(posts);
  renderTable();
}

function showView(view) {
  document.getElementById('postsView').style.display = view === 'posts' ? '' : 'none';
  document.getElementById('settingsView').style.display = view === 'settings' ? '' : 'none';
  document.getElementById('pageTitle').textContent = view === 'posts' ? '📝 文章管理' : '⚙ 网站设置';
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.sidebar a')[view === 'posts' ? 0 : 1].classList.add('active');
}

function preview() {
  window.open('../index.html', '_blank');
}

function saveSettings() {
  const pwd = document.getElementById('adminPassword').value;
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ password: pwd }));
  alert('设置已保存！');
}

// ===== 登录验证 =====
(function() {
  const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
  const correctPwd = settings.password || 'shizi2026';
  const loggedIn = sessionStorage.getItem('admin_logged_in');
  if (loggedIn === 'true') { renderTable(); return; }

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="login-screen">
      <div class="login-box">
        <div style="font-size:48px;margin-bottom:12px;">🔐</div>
        <h2>后台管理</h2>
        <p>请输入密码登录</p>
        <input type="password" id="loginPwd" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">登录</button>
        <div class="error" id="loginError">密码错误，请重试</div>
        <p style="color:#555;font-size:12px;margin-top:16px;">默认密码: shizi2026</p>
      </div>
    </div>
  `;
  window.doLogin = function() {
    const pwd = document.getElementById('loginPwd').value;
    if (pwd === correctPwd) {
      sessionStorage.setItem('admin_logged_in', 'true');
      location.reload();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  };
})();
</script>
</body>
</html>
